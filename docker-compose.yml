# PrismTrade — first-deploy compose.
# Serves the app over HTTP on port 8090:  http://145.79.7.61:8090
# This proves the build + backend + live chart + paper trading run on the server.
# HTTPS via the existing Traefik proxy is the next step (see DEPLOYMENT_VPS.md).
#
# Secrets come from the .env file in this directory (NOT committed). Required keys:
#   POSTGRES_PASSWORD, DATABASE_URL, SECRET_KEY, ENCRYPTION_KEY

services:
  app:
    build: .
    env_file: .env
    depends_on: [db]
    ports:
      - "8090:5000"
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: prism
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: prismtrade
    volumes:
      - prism_db:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  prism_db:
